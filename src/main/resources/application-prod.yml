# prod 环境只负责声明 Nacos 入口；业务配置继续放 Nacos prod namespace / DEFAULT_GROUP。
# 当前 dev/test/prod 暂时共用同一套 Nacos 地址和 namespace，正式上线前必须改为生产 Nacos 地址和 prod namespace。
custom:
  nacos-ip: ${NACOS_PROD_SERVER_ADDR:${NACOS_SERVER_ADDR:172.16.1.39:8848}}
  namespace: ${NACOS_PROD_NAMESPACE:${NACOS_NAMESPACE:cfbf4c42-5ebb-4566-a095-30a568556a85}}

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${custom.nacos-ip}
        namespace: ${custom.namespace}
        group: ${custom.nacos-group}
      config:
        server-addr: ${custom.nacos-ip}
        namespace: ${custom.namespace}
        group: ${custom.nacos-group}
        file-extension: yaml
  config:
    import:
      - "optional:nacos:logging.yml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:reuse-configuration.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:traffic-governance.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:security-auth.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:swagger.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:message.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:message-spring.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:redis.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:seata.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:xxl-job.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:zipkin.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:admin.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:dubbo.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:mybatis-plus.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:rabbitmq.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      - "optional:nacos:elasticsearch.yaml?group=DEFAULT_GROUP&refreshEnabled=true"

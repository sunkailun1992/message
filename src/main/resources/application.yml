# message 服务本地启动端口。
server:
  port: 7400

# 连接 Nacos 前必须先有的启动入口配置。
# 这里不能引用 reuse-configuration.yaml，因为远程配置还没有加载。
custom:
  # Nacos 默认分组，大部分公共配置放 DEFAULT_GROUP。
  nacos-group: ${NACOS_GROUP:DEFAULT_GROUP}

spring:
  profiles:
    # 只通过 APP_ENV 或 spring.profiles.active 选择 dev/test/prod；Nacos 地址和 namespace 放在对应 application-*.yml。
    active: ${APP_ENV:dev}
  application:
    # 服务注册名，也是其他微服务通过 lb://message 访问 message 服务的名称。
    name: message
  main:
    # 兼容公共 utils 和业务侧可能重复声明的基础 Bean。
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      # 服务注册与发现配置。
      discovery:
        server-addr: ${custom.nacos-ip}
        namespace: ${custom.namespace}
        group: ${custom.nacos-group}
      # 配置中心入口，负责加载 spring.config.import 中列出的远程 YAML。
      config:
        server-addr: ${custom.nacos-ip}
        namespace: ${custom.namespace}
        group: ${custom.nacos-group}
        file-extension: yaml
  config:
    import:
      # logging.yml：日志级别、日志路径等通用日志配置。
      - "optional:nacos:logging.yml?group=DEFAULT_GROUP&refreshEnabled=true"
      # reuse-configuration.yaml：MySQL、Redis、RabbitMQ、Seata、Admin 等基础设施公共地址变量。
      - "optional:nacos:reuse-configuration.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # traffic-governance.yaml：灰度发布版本、泳道、实例元数据和权重治理配置。
      - "optional:nacos:traffic-governance.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # security-auth.yaml：统一认证开关、JWT、网关透传头和白名单配置。
      - "optional:nacos:security-auth.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # swagger.yaml：Fleet 统一 Swagger/OpenAPI 开关（显示名默认取服务名，message.yaml 可覆盖）。
      - "optional:nacos:swagger.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # message.yaml：message 服务业务配置，例如消息模板、投递策略等非 Spring 体系参数。
      - "optional:nacos:message.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # message-spring.yaml：message 服务端口、数据源、线程池等 Spring 体系配置。
      - "optional:nacos:message-spring.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # redis.yaml：Redis 客户端配置，供缓存、幂等或分布式能力使用。
      - "optional:nacos:redis.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # seata.yaml：分布式事务客户端配置，连接 Seata Server 2.7.0。
      - "optional:nacos:seata.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # xxl-job.yaml：XXL-JOB 执行器注册地址和执行器端口配置。
      - "optional:nacos:xxl-job.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # zipkin.yaml：链路追踪上报地址和采样配置。
      - "optional:nacos:zipkin.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # admin.yaml：Spring Boot Admin 客户端注册配置。
      - "optional:nacos:admin.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # dubbo.yaml：Dubbo RPC 注册、协议、超时和重试等共享配置。
      - "optional:nacos:dubbo.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # mybatis-plus.yaml：MyBatis-Plus、分页、DDL 等公共 ORM 配置。
      - "optional:nacos:mybatis-plus.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # rabbitmq.yaml：RabbitMQ 标准 spring.rabbitmq.* 连接和监听重试配置。
      - "optional:nacos:rabbitmq.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
      # elasticsearch.yaml：Elasticsearch 客户端和日志索引配置。
      - "optional:nacos:elasticsearch.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
